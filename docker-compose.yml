services:
  minio:
    image: minio/minio:latest
    container_name: netflix-dwh
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    volumes:
      - ./data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
  create_buckets:
    image: minio/minio:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set netflix-dwh http://minio:9000 admin admin123;
      mc mb --ignore-existing netflix-dwh/bronze;
      mc mb --ignore-existing netflix-dwh/silver;
      mc mb --ignore-existing netflix-dwh/gold;"
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netflix-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    depends_on:
      - minio
    tty: true

  compute:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigdata-compute
    volumes:
      - ./app:/app
    working_dir: /app
    depends_on:
      - minio
    tty: true
